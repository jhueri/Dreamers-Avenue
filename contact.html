<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Dreamers Avenue</title>
  <link rel="stylesheet" href="styles.css"> <!-- Link to your external CSS file -->
</head>

<body>
  <header class="header">
    <nav class="navbar">
        <ul class="navbar-list">
          <li class="navbar-item"><a href="index.html" class="navbar-link">Home</a></li>
          <li class="navbar-item"><a href="programs.html" class="navbar-link">Programs</a></li>
          <li class="navbar-item"><a href="scholarships.html" class="navbar-link">Scholarships</a></li>
          <li class="navbar-item"><a href="contact.html" class="navbar-link">Contact Us</a></li>
        </ul>
    </nav>
  </header>

  <main class="main">
    <section id="contact-us" class="container">
      <h2 class="contact-heading">Contact Us</h2>
      <p class="contact-description">We'd love to hear from you! Whether you have questions, suggestions, or just want to connect, feel free to reach out to us.</p>

      <!-- Contact Form -->
      <form action="https://formspree.io/f/xpwzoply" method="POST" class="contact-form">
        <label for="email" class="form-label">Your email:</label>
        <input type="email" name="email" id="email" class="form-input" required>

        <label for="message" class="form-label">Your message:</label>
        <textarea name="message" id="message" class="form-textarea" required></textarea>

        <button type="submit" class="form-button">Send</button>
      </form>

      <div class="contact-method">
        <h3 class="contact-method-heading">Follow Us</h3>
        <p class="contact-method-text">Stay updated with our latest news and events.</p>
        <a href="https://www.linkedin.com/company/dreamers-avenue" target="_blank" class="contact-link">LinkedIn</a>
        <a href="https://www.tiktok.com/@dreamers.ave" target="_blank" class="contact-link">TikTok</a>
        <a href="https://www.instagram.com/dreamers.ave/" target="_blank" class="contact-link">Instagram</a>
      </div>
    </div>
    </section>
  </main>
</body>

</html>
